version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-tour-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tour
      POSTGRES_PASSWORD: tour_secret_2026
      POSTGRES_DB: ai_tour_os
    volumes:
      - ai-tour-db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tour -d ai_tour_os"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-tour

  redis:
    image: redis:7-alpine
    container_name: ai-tour-redis
    restart: unless-stopped
    volumes:
      - ai-tour-redis-data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ai-tour

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-tour-qdrant
    restart: unless-stopped
    volumes:
      - ai-tour-qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6334:6333"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-tour

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ai-tour-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-tour
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-tour-backend.rule=Host(`api-tour-ai.overpowers.agency`)"
      - "traefik.http.routers.ai-tour-backend.entrypoints=websecure"
      - "traefik.http.routers.ai-tour-backend.tls=true"
      - "traefik.http.routers.ai-tour-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-tour-backend.loadbalancer.server.port=4000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: ai-tour-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-tour
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-tour-frontend.rule=Host(`tour-ai.overpowers.agency`)"
      - "traefik.http.routers.ai-tour-frontend.entrypoints=websecure"
      - "traefik.http.routers.ai-tour-frontend.tls=true"
      - "traefik.http.routers.ai-tour-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-tour-frontend.loadbalancer.server.port=3000"

volumes:
  ai-tour-db-data:
  ai-tour-redis-data:
  ai-tour-qdrant-data:

networks:
  ai-tour:
    driver: bridge
  coolify:
    external: true
