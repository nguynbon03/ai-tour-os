services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ai-tour-backend
    restart: unless-stopped
    env_file: .env
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-tour-backend.rule=Host(`api-tour-ai.overpowers.agency`)"
      - "traefik.http.routers.ai-tour-backend.entrypoints=https"
      - "traefik.http.routers.ai-tour-backend.tls=true"
      - "traefik.http.routers.ai-tour-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-tour-backend.loadbalancer.server.port=4000"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.routers.ai-tour-backend.middlewares=cors"
      - "traefik.http.routers.ai-tour-backend-http.rule=Host(`api-tour-ai.overpowers.agency`)"
      - "traefik.http.routers.ai-tour-backend-http.entrypoints=http"
      - "traefik.http.routers.ai-tour-backend-http.middlewares=redirect-to-https@file"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: ai-tour-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-tour-frontend.rule=Host(`tour-ai.overpowers.agency`)"
      - "traefik.http.routers.ai-tour-frontend.entrypoints=https"
      - "traefik.http.routers.ai-tour-frontend.tls=true"
      - "traefik.http.routers.ai-tour-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-tour-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.ai-tour-frontend-http.rule=Host(`tour-ai.overpowers.agency`)"
      - "traefik.http.routers.ai-tour-frontend-http.entrypoints=http"
      - "traefik.http.routers.ai-tour-frontend-http.middlewares=redirect-to-https@file"

networks:
  coolify:
    external: true
